
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F84F39">
    
    <!-- Meta tags para iOS/Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PedeJá">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/P5tM32f8/pedeja-logo.png">
    
    <!-- Meta tags para Android/Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>PedeJá Delivery</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/P5tM32f8/pedeja-logo.png">
    <link rel="manifest" href="/manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet JS -->
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Mercado Pago SDK -->
    <script defer src="https://sdk.mercadopago.com/js/v2"></script>
    
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@neondatabase/serverless": "https://esm.sh/@neondatabase/serverless@^0.10.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">

<!-- OneSignal Web Push -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    try {
      await OneSignal.init({
        appId: "8cef6b5b-3fac-4038-9c70-120e90fd4f57",
      });
    } catch (error) {
      console.warn("OneSignal ignorado: O domínio atual não corresponde ao configurado no painel do OneSignal.", error);
    }
  });
</script>
</head>
<body class="bg-[#f7f7f7]">
    <div id="root">
      <!-- Tela de carregamento estática (Splash Screen) para evitar "tela em branco" antes do React hidratar -->
      <div style="min-height: 100dvh; background-color: #f7f7f7; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem;">
        <div style="text-align: center; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">
          <h1 style="font-size: 4.5rem; font-weight: 900; font-style: italic; letter-spacing: -0.05em; font-family: 'Poppins', sans-serif; user-select: none; margin-bottom: 1rem;">
            <span style="color: #F84F39;">Pede</span><span style="color: #FFB800;">Já</span>
          </h1>
          <div style="width: 3rem; height: 3rem; border: 4px solid #F84F39; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 2rem auto 0 auto;"></div>
        </div>
      </div>
      <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @media (min-width: 768px) { h1 { font-size: 6rem !important; } }
      </style>
    </div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('PedeJá PWA Ativo');
            })
            .catch(err => console.log('PWA falhou:', err));
        });
      }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
