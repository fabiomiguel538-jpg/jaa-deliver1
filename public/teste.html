<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste de Notificação</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f3f4f6;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    button {
      padding: 16px 32px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background-color: #3b82f6;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: background-color 0.2s, transform 0.1s;
    }
    button:hover {
      background-color: #2563eb;
    }
    button:active {
      transform: scale(0.98);
    }
    button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }
    #status {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      color: #374151;
      max-width: 400px;
      word-wrap: break-word;
      min-height: 20px;
    }
    .input-group {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    input {
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 16px;
      text-align: center;
      width: 100px;
    }
    label {
      font-size: 14px;
      color: #4b5563;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="input-group">
      <label for="pedido-id">ID do Pedido (Tabela Neon):</label>
      <input type="number" id="pedido-id" value="1" min="1">
    </div>
    
    <button id="btn-teste">ENVIAR NOTIFICAÇÃO DE TESTE</button>
    <div id="status"></div>
  </div>

  <script>
    document.getElementById('btn-teste').addEventListener('click', async () => {
      const btn = document.getElementById('btn-teste');
      const status = document.getElementById('status');
      const inputId = document.getElementById('pedido-id');
      
      const pedidoId = parseInt(inputId.value) || 1;
      
      btn.disabled = true;
      status.textContent = 'Enviando requisição...';
      status.style.color = '#4b5563';

      try {
        const response = await fetch('/.netlify/functions/enviar-notificacao', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ id: pedidoId })
        });

        const data = await response.json();

        if (response.ok) {
          status.textContent = '✅ Sucesso: ' + JSON.stringify(data);
          status.style.color = '#059669'; // green
        } else {
          status.textContent = '❌ Erro: ' + JSON.stringify(data);
          status.style.color = '#dc2626'; // red
        }
      } catch (error) {
        status.textContent = '⚠️ Erro de rede/fetch: ' + error.message;
        status.style.color = '#dc2626';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
